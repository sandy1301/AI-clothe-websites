<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us | LUXE & CO</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">

<style>
.contact-hero{
    background: linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),
    url("https://images.unsplash.com/photo-1521334884684-d80222895322");
    background-size:cover;
    background-position:center;
    height:250px;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#fff;
    margin-top:70px;
}

.contact-card{
    background:#fff;
    border-radius:12px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.contact-info i{
    font-size:20px;
    color:#c5a059;
    margin-right:10px;
}

.social-icons i{
    font-size:22px;
    margin-right:12px;
    cursor:pointer;
    transition:.3s;
}

.social-icons i:hover{
    color:#c5a059;
    transform:translateY(-3px);
}
</style>

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark fixed-top">
<div class="container">

<a class="navbar-brand fw-bold" href="index.html">LUXE & CO</a>

<button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="nav">

<ul class="navbar-nav mx-auto">
<li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
<li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
<li class="nav-item"><a class="nav-link" href="products.html">Products</a></li>
<li class="nav-item"><a class="nav-link active" href="contact.html">Contact</a></li>
</ul>

<div class="d-flex gap-3">
<i class="bi bi-heart fs-5"></i>
<i class="bi bi-cart3 fs-5"></i>
</div>

</div>
</div>
</nav>

<!-- HERO -->
<section class="contact-hero">
<h1 class="fw-bold">Contact Us</h1>
</section>

<!-- CONTACT SECTION -->
<section class="py-5">
<div class="container">

<div class="row g-5 align-items-center">

<!-- FORM -->
<div class="col-lg-6">

<div class="contact-card p-4">

<h3 class="fw-bold mb-3">Get In Touch</h3>

<form>

<div class="mb-3">
<input type="text" class="form-control p-3" placeholder="Your Name">
</div>

<div class="mb-3">
<input type="email" class="form-control p-3" placeholder="Email Address">
</div>

<div class="mb-3">
<input type="tel" class="form-control p-3" placeholder="Phone Number">
</div>

<div class="mb-3">
<input type="text" class="form-control p-3" placeholder="Subject">
</div>

<div class="mb-3">
<textarea class="form-control p-3" rows="5" placeholder="Message"></textarea>
</div>

<button class="btn btn-dark w-100">Send Message</button>

</form>

</div>
</div>

<!-- IMAGE -->
<div class="col-lg-6 text-center">

<img src="https://images.unsplash.com/photo-1441986300917-64674bd600d8"
class="img-fluid rounded shadow">

</div>

</div>

<!-- INFO SECTION -->
<div class="row mt-5 text-center">

<div class="col-md-4 contact-info">
<i class="bi bi-geo-alt-fill"></i>
<h6>Address</h6>
<p>Chennai, Tamil Nadu, India</p>
</div>

<div class="col-md-4 contact-info">
<i class="bi bi-telephone-fill"></i>
<h6>Phone</h6>
<p>+91 98765 43210</p>
</div>

<div class="col-md-4 contact-info">
<i class="bi bi-envelope-fill"></i>
<h6>Email</h6>
<p>support@luxeandco.com</p>
</div>

</div>

<!-- SOCIAL -->
<div class="text-center mt-4 social-icons">

<i class="bi bi-instagram"></i>
<i class="bi bi-facebook"></i>
<i class="bi bi-telegram"></i>
<i class="bi bi-linkedin"></i>
<i class="bi bi-twitter-x"></i>

</div>

</div>
</section>

<!-- FOOTER -->
<footer class="bg-dark text-white text-center py-4 mt-5">
<p class="mb-0">© 2026 LUXE & CO. All Rights Reserved.</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
