<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up | LUXE & CO</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">

<style>
body{
    background: linear-gradient(135deg,#111,#333);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family: 'Poppins', sans-serif;
}

.signup-box{
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(15px);
    border-radius: 15px;
    padding: 40px;
    width: 100%;
    max-width: 500px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    color: #fff;
}

.signup-box h2{
    font-weight:700;
    text-align:center;
    margin-bottom:20px;
}

.form-control{
    background: rgba(255,255,255,0.1);
    border: none;
    color: #fff;
}

.form-control::placeholder{
    color:#ccc;
}

.btn-signup{
    background:#c5a059;
    border:none;
    border-radius:50px;
    padding:12px;
    font-weight:600;
    width:100%;
    transition:.3s;
}

.btn-signup:hover{
    background:#fff;
    color:#000;
}

.small-link{
    color:#ccc;
    font-size:14px;
    text-decoration:none;
}

.small-link:hover{
    color:#c5a059;
}

.icon-input{
    position:relative;
}

.icon-input i{
    position:absolute;
    right:15px;
    top:12px;
    cursor:pointer;
    color:#ccc;
}
</style>

</head>

<body>

<div class="signup-box">

<h2>LUXE & CO</h2>
<p class="text-center text-muted">Create your account</p>

<form>

<!-- NAME -->
<div class="mb-3">
<input type="text" class="form-control p-3" placeholder="Full Name">
</div>

<!-- EMAIL -->
<div class="mb-3">
<input type="email" class="form-control p-3" placeholder="Email Address">
</div>

<!-- PHONE -->
<div class="mb-3">
<input type="tel" class="form-control p-3" placeholder="Phone Number">
</div>

<!-- PASSWORD -->
<div class="mb-3 icon-input">
<input type="password" id="password" class="form-control p-3" placeholder="Password">
<i class="bi bi-eye" onclick="togglePassword('password')"></i>
</div>

<!-- CONFIRM PASSWORD -->
<div class="mb-3 icon-input">
<input type="password" id="confirmPassword" class="form-control p-3" placeholder="Confirm Password">
<i class="bi bi-eye" onclick="togglePassword('confirmPassword')"></i>
</div>

<!-- TERMS -->
<div class="mb-3">
<input type="checkbox"> <small>I agree to Terms & Conditions</small>
</div>

<!-- BUTTON -->
<button type="submit" class="btn-signup mb-3">
Register
</button>

</form>

<p class="text-center">
Already have an account?
<a href="login.html" class="small-link">Login</a>
</p>

</div>

<script>
function togglePassword(id){
    let pass = document.getElementById(id);
    if(pass.type === "password"){
        pass.type = "text";
    } else {
        pass.type = "password";
    }
}
</script>

</body>
</html>
