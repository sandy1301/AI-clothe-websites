<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | LUXE & CO</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">

<style>
body{
    background: linear-gradient(135deg,#111,#333);
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family: 'Poppins', sans-serif;
}

.login-box{
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(15px);
    border-radius: 15px;
    padding: 40px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    color: #fff;
}

.login-box h2{
    font-weight:700;
    text-align:center;
    margin-bottom:25px;
}

.form-control{
    background: rgba(255,255,255,0.1);
    border: none;
    color: #fff;
}

.form-control::placeholder{
    color:#ccc;
}

.btn-login{
    background:#c5a059;
    border:none;
    border-radius:50px;
    padding:12px;
    font-weight:600;
    width:100%;
    transition:.3s;
}

.btn-login:hover{
    background:#fff;
    color:#000;
}

.small-link{
    color:#ccc;
    font-size:14px;
    text-decoration:none;
}

.small-link:hover{
    color:#c5a059;
}

.icon-input{
    position:relative;
}

.icon-input i{
    position:absolute;
    right:15px;
    top:12px;
    cursor:pointer;
    color:#ccc;
}
</style>

</head>

<body>

<div class="login-box">

<h2>LUXE & CO</h2>
<p class="text-center text-muted">Login to your account</p>

<form>

<!-- EMAIL -->
<div class="mb-3">
<input type="email" class="form-control p-3" placeholder="Email Address">
</div>

<!-- PASSWORD -->
<div class="mb-3 icon-input">
<input type="password" id="password" class="form-control p-3" placeholder="Password">
<i class="bi bi-eye" onclick="togglePassword()"></i>
</div>

<!-- REMEMBER + FORGOT -->
<div class="d-flex justify-content-between mb-3">
<div>
<input type="checkbox"> <small>Remember me</small>
</div>
<a href="#" class="small-link">Forgot Password?</a>
</div>

<!-- BUTTON -->
<button type="submit" class="btn-login mb-3">
Login
</button>

</form>

<p class="text-center">
Don't have an account?
<a href="signup.html" class="small-link">Sign Up</a>
</p>

</div>

<script>
function togglePassword(){
    let pass = document.getElementById("password");
    if(pass.type === "password"){
        pass.type = "text";
    } else {
        pass.type = "password";
    }
}
</script>

</body>
</html>
