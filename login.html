<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | LUXE & CO</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="login-box">

<h2>LUXE & CO</h2>
<p class="text-center text-muted">Login to your account</p>

<form>

<!-- EMAIL -->
<div class="mb-3">
<input type="email" class="form-control p-3" placeholder="Email Address">
</div>

<!-- PASSWORD -->
<div class="mb-3 icon-input">
<input type="password" id="password" class="form-control p-3" placeholder="Password">
<i class="bi bi-eye" onclick="togglePassword()"></i>
</div>

<!-- REMEMBER + FORGOT -->
<div class="d-flex justify-content-between mb-3">
<div>
<input type="checkbox"> <small>Remember me</small>
</div>
<a href="#" class="small-link">Forgot Password?</a>
</div>

<!-- BUTTON -->
<button type="submit" class="btn-login mb-3">
Login
</button>

</form>

<p class="text-center">
Don't have an account?
<a href="signup.html" class="small-link">Sign Up</a>
</p>

</div>

<script>
function togglePassword(){
    let pass = document.getElementById("password");
    if(pass.type === "password"){
        pass.type = "text";
    } else {
        pass.type = "password";
    }
}
</script>

</body>
</html>
