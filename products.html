<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Products | LUXE & CO</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
<div class="container">

<a class="navbar-brand fw-bold" href="index.html">LUXE & CO</a>

<button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="nav">

<ul class="navbar-nav mx-auto">
<li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
<li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
<li class="nav-item"><a class="nav-link active" href="products.html">Products</a></li>
<li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
</ul>

<div class="d-flex gap-3 text-white">
<i class="bi bi-heart fs-5"></i>
<a href="cart.html" class="text-white"><i class="bi bi-cart3 fs-5"></i></a>
</div>

</div>
</div>
</nav>

<!-- HEADER -->
<div class="container mt-5 pt-5">

<h2 class="text-center fw-bold mb-4">Our Collection</h2>

<!-- SEARCH -->
<div class="row mb-3">
<div class="col-md-6 mx-auto">
<input type="text"
id="searchInput"
class="form-control p-3"
placeholder="Search products..."
onkeyup="searchProducts()">
</div>
</div>

<!-- FILTER BUTTONS -->
<div class="text-center mb-4">
<button class="btn btn-dark btn-sm" onclick="filterProducts('all')">All</button>
<button class="btn btn-outline-dark btn-sm" onclick="filterProducts('men')">Men</button>
<button class="btn btn-outline-dark btn-sm" onclick="filterProducts('women')">Women</button>
<button class="btn btn-outline-danger btn-sm" onclick="filterProducts('sale')">Sale</button>
</div>

<!-- PRODUCTS GRID -->
<div class="row g-4" id="productList">

<!-- PRODUCT 1 -->
<div class="col-md-3 product-card"
data-name="premium hoodie"
data-category="men">

<div class="card shadow-sm">

<div class="position-relative">
<img src="https://images.unsplash.com/photo-1520975916090-3105956dac38" class="img-fluid">

<span class="badge bg-danger position-absolute top-0 start-0 m-2">SALE</span>

<i class="bi bi-heart position-absolute top-0 end-0 m-2 fs-5 text-danger"></i>
</div>

<div class="p-3">
<h6>Premium Hoodie</h6>
<p class="text-warning">★★★★★</p>

<p>
<span class="text-danger fw-bold">$49</span>
<del class="text-muted">$79</del>
</p>

<button class="btn btn-dark w-100"
onclick="addToCart(1,'Premium Hoodie',49,'https://images.unsplash.com/photo-1520975916090-3105956dac38')">
Add to Cart
</button>
</div>

</div>
</div>

<!-- PRODUCT 2 -->
<div class="col-md-3 product-card"
data-name="casual shirt"
data-category="men">

<div class="card shadow-sm">
<img src="img 1.jpeg" class="img-fluid">

<div class="p-3">
<h6>Casual Shirt</h6>
<p class="text-warning">★★★★☆</p>
<p class="fw-bold">$39</p>

<button class="btn btn-dark w-100"
onclick="addToCart(2,'Casual Shirt',39,'https://images.unsplash.com/photo-1521335629791-ce4aec67dd49')">
Add to Cart
</button>
</div>
</div>
</div>

<!-- PRODUCT 3 -->
<div class="col-md-3 product-card"
data-name="denim jacket"
data-category="men">

<div class="card shadow-sm">
<img src="https://images.unsplash.com/photo-1602810318383-e386cc2a3ccf" class="img-fluid">

<div class="p-3">
<h6>Denim Jacket</h6>
<p class="text-warning">★★★★★</p>
<p><span class="text-danger">$69</span> <del>$99</del></p>

<button class="btn btn-dark w-100"
onclick="addToCart(3,'Denim Jacket',69,'https://images.unsplash.com/photo-1602810318383-e386cc2a3ccf')">
Add to Cart
</button>
</div>
</div>
</div>

<!-- PRODUCT 4 -->
<div class="col-md-3 product-card"
data-name="summer dress"
data-category="women">

<div class="card shadow-sm">
<img src="img 2.jpeg" class="img-fluid">

<div class="p-3">
<h6>Summer Dress</h6>
<p class="text-warning">★★★★★</p>
<p class="fw-bold">$45</p>

<button class="btn btn-dark w-100"
onclick="addToCart(4,'Summer Dress',45,'https://images.unsplash.com/photo-1520975682031-ae3d6f7f5f7a')">
Add to Cart
</button>
</div>
</div>
</div>

</div>
</div>

<!-- SCRIPTS -->
<script src="js/cart.js"></script>
<script src="js/products.js"></script>

</body>
</html>
